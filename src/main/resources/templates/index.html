<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校选课管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>高校选课管理系统</h1>

        <!-- 功能一：数据批量导入 -->
        <div class="section">
            <h2>CSV 数据批量导入</h2>
            <p class="hint">请按以下格式输入选课数据，每条一行：<br>
            <code>学号,课程ID,课程名称,课程类型</code><br>
            示例：<code>S000001,C000001,Java程序设计,专业课</code></p>
            <textarea id="csvInput" rows="8" placeholder="S000001,C000001,Java程序设计,专业课&#10;S000002,C000003,计算机网络,专业课&#10;S000004,C000006,音乐鉴赏,选修课"></textarea>
            <div class="button-row">
                <button id="importBtn" onclick="importCsv()">导入数据</button>
                <button id="refreshBtn" onclick="loadAllData()">刷新数据</button>
            </div>
            <div id="importMsg" class="msg"></div>
        </div>

        <!-- 功能二：选课检索 -->
        <div class="section">
            <h2>选课记录检索</h2>
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="请输入学生ID、课程ID、课程名称或课程类型...">
                <button onclick="searchRecords()">检索</button>
            </div>
            <div id="searchMsg" class="msg"></div>
            <div id="searchResults" class="results" style="display:none;">
                <h3>检索结果</h3>
                <table id="searchTable">
                    <thead>
                        <tr>
                            <th>学生ID</th>
                            <th>课程ID</th>
                            <th>课程名称</th>
                            <th>课程类型</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- 功能三：数据展示（按课程类型分类） -->
        <div class="section">
            <h2>选课数据展示（按课程类型分类）</h2>
            <div id="dataDisplay">
                <p class="loading">加载中...</p>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // 页面加载时初始化数据展示
        document.addEventListener('DOMContentLoaded', function() {
            loadAllData();
        });

        /**
         * 批量导入CSV选课数据
         * 【AI生成】前端通过fetch POST将CSV文本提交到后端
         */
        function importCsv() {
            const csvData = document.getElementById('csvInput').value.trim();
            const msgDiv = document.getElementById('importMsg');

            if (!csvData) {
                msgDiv.className = 'msg error';
                msgDiv.textContent = '请输入CSV数据';
                return;
            }

            fetch('/api/enroll/import', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ csvData: csvData })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    msgDiv.className = 'msg success';
                    msgDiv.textContent = data.message;
                    renderGroupedData(data.groupedRecords);
                } else {
                    msgDiv.className = 'msg error';
                    msgDiv.textContent = data.message;
                }
            })
            .catch(err => {
                msgDiv.className = 'msg error';
                msgDiv.textContent = '导入失败：' + err.message;
            });
        }

        /**
         * 加载全部选课数据
         */
        function loadAllData() {
            fetch('/api/enroll/grouped')
                .then(res => res.json())
                .then(data => {
                    renderGroupedData(data);
                })
                .catch(err => {
                    document.getElementById('dataDisplay').innerHTML =
                        '<p class="error-msg">加载失败：' + err.message + '</p>';
                });
        }

        /**
         * 检索选课记录
         * 【手动修改】增加了"无匹配选课记录"的空结果提示
         */
        function searchRecords() {
            const keyword = document.getElementById('searchInput').value.trim();
            const msgDiv = document.getElementById('searchMsg');
            const resultsDiv = document.getElementById('searchResults');
            const tbody = document.querySelector('#searchTable tbody');

            if (!keyword) {
                msgDiv.className = 'msg error';
                msgDiv.textContent = '请输入检索关键词';
                return;
            }

            fetch('/api/enroll/search?keyword=' + encodeURIComponent(keyword))
                .then(res => res.json())
                .then(data => {
                    if (data.records && data.records.length > 0) {
                        msgDiv.className = 'msg success';
                        msgDiv.textContent = data.message;
                        resultsDiv.style.display = 'block';
                        tbody.innerHTML = data.records.map(r =>
                            '<tr>' +
                            '<td>' + r.studentId + '</td>' +
                            '<td>' + r.courseId + '</td>' +
                            '<td>' + r.courseName + '</td>' +
                            '<td>' + (r.courseType || '未分类') + '</td>' +
                            '</tr>'
                        ).join('');
                    } else {
                        msgDiv.className = 'msg error';
                        msgDiv.textContent = '无匹配选课记录';
                        resultsDiv.style.display = 'none';
                    }
                })
                .catch(err => {
                    msgDiv.className = 'msg error';
                    msgDiv.textContent = '检索失败：' + err.message;
                });
        }

        /**
         * 按课程类型分组渲染选课数据
         * 【手动修改】增加了空数据提示和分组标题样式
         */
        function renderGroupedData(groupedRecords) {
            const display = document.getElementById('dataDisplay');

            if (!groupedRecords || Object.keys(groupedRecords).length === 0) {
                display.innerHTML = '<p class="empty-msg">暂无选课记录</p>';
                return;
            }

            let html = '';
            for (const [type, records] of Object.entries(groupedRecords)) {
                html += '<div class="type-group">';
                html += '<h3 class="type-title">' + type + '（' + records.length + '条）</h3>';
                html += '<table>';
                html += '<thead><tr><th>学生ID</th><th>课程ID</th><th>课程名称</th><th>课程类型</th></tr></thead>';
                html += '<tbody>';
                html += records.map(r =>
                    '<tr>' +
                    '<td>' + r.studentId + '</td>' +
                    '<td>' + r.courseId + '</td>' +
                    '<td>' + r.courseName + '</td>' +
                    '<td>' + (r.courseType || '未分类') + '</td>' +
                    '</tr>'
                ).join('');
                html += '</tbody></table></div>';
            }
            display.innerHTML = html;
        }
    </script>
</body>
</html>
